project_id = "blfhlpohwrpbdetepzaq"

[api]
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
otp_length = 6
otp_expiry = 3600

[auth.rate_limits]
email_sent = 2
token_refresh = 150
sign_in_sign_ups = 30
anonymous_users = 30
token_verifications = 30

[storage]
file_size_limit = "50MiB"
